<script>
    document.addEventListener("DOMContentLoaded", function() {
        var maxbotBtn = document.getElementById("maxbot-button");
        var params = new URLSearchParams(window.location.search);
        var utm = null;

        // Порядок приоритета:
        // 1. Явно заданная метка utm_code
        if (params.has("utm_code")) {
            utm = params.get("utm_code");
        }
        // 2. Яндекс часто использует utm_content для идентификатора объявления
        else if (params.has("utm_content")) {
            utm = params.get("utm_content");
        }
        // 3. utm_source (например, yandex, google)
        else if (params.has("utm_source")) {
            utm = params.get("utm_source");
        }
        // 4. utm_campaign
        else if (params.has("utm_campaign")) {
            utm = params.get("utm_campaign");
        }
        // 5. utm_term
        else if (params.has("utm_term")) {
            utm = params.get("utm_term");
        }
        // 6. Яндекс yclid (идентификатор клика)
        else if (params.has("yclid")) {
            utm = params.get("yclid");
        }
        // 7. Значение, переданное через CRM (если используется crm_button_v2.js)
        else if (window.u_code) {
            utm = window.u_code;
        }

        if (maxbotBtn && utm) {
            maxbotBtn.href = maxbotBtn.href + "?start=" + encodeURIComponent(utm);
        }
    });
</script>

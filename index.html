<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кнопки WhatsApp, Telegram и MAXBOT</title>
    <style>
        .whatsapp-button {
            display: inline-block;
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
        }
        .telegram-button {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            margin-left: 10px;
        }
        .max-button {
            display: inline-block;
            background-color: #6A5ACD; /* фиолетовый MAXBOT */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            margin-left: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .max-button:hover {
            background-color: #4b3db3; /* темнее при наведении */
        }
    </style>
</head>
<body>

<!-- Кнопки для отправки сообщений -->
<a href="https://wa.me/375298943845" class="whatsapp-button" target="_blank">
    Написать в WhatsApp
</a>

<a href="https://t.me/Excee_bot" class="telegram-button" target="_blank">
    Написать в Telegram
</a>

<a id="maxbot-button" 
   href="https://max.ru/id132706993814_bot" 
   class="max-button" target="_blank">
    Написать в MAXBOT
</a>

<script id="crm-button-script" src="https://app.i2crm.ru/api_v1/js/crm_button_v2.js" 
        data-ym-counters="96883785" 
        data-endpoint="https://app.i2crm.ru/api_v1/metrics/key" 
        data-text="Номер вашего обращения: {u_code}. Пожалуйста, отправьте это сообщение."></script>

k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})

<!-- /Yandex.Metrika counter -->

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var maxbotBtn = document.getElementById("maxbot-button");
        var utm = null;

        // 1. Попробуем взять utm_source из dataLayer
        if (window.dataLayer) {
            for (var i = 0; i < window.dataLayer.length; i++) {
                if (window.dataLayer[i].utm_source) {
                    utm = window.dataLayer[i].utm_source;
                    break;
                }
            }
        }

        // 2. Если нет — берём из URL параметров
        if (!utm) {
            var params = new URLSearchParams(window.location.search);
            if (params.has("utm_source")) {
                utm = params.get("utm_source");
            }
        }

        // 3. Подставляем в ссылку
        if (maxbotBtn && utm) {
            maxbotBtn.href = maxbotBtn.href + "?start=" + encodeURIComponent(utm);
        }
    });

    // Обработчики для кнопок
    document.querySelector('.whatsapp-button').addEventListener('click', function(event) {
        window.open(this.href, '_blank');
    });
    document.querySelector('.telegram-button').addEventListener('click', function(event) {
        window.open(this.href, '_blank');
    });
    document.querySelector('.max-button').addEventListener('click', function(event) {
        window.open(this.href, '_blank');
    });
</script>

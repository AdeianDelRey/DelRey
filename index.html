<script>
    // Обработчики кликов для обычных кнопок (WhatsApp, Telegram, старые MAX)
    document.querySelector('.whatsapp-button')?.addEventListener('click', function() {
        window.open(this.href, '_blank');
    });
    document.querySelector('.telegram-button')?.addEventListener('click', function() {
        window.open(this.href, '_blank');
    });
    document.querySelectorAll('.max-button, .maxbot-button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            window.open(this.href, '_blank');
        });
    });

    // === Динамическое добавление ?start=... к кнопке MAXBOT ===
    (function() {
        var maxbotBtn = document.getElementById("maxbot-button");
        if (!maxbotBtn) return;

        function getUtmAndUpdateLink() {
            var params = new URLSearchParams(window.location.search);
            var utm = null;

            // Приоритет UTM-меток
            if (params.has("utm_content")) {
                utm = params.get("utm_content");
            } else if (params.has("utm_source")) {
                utm = params.get("utm_source");
            } else if (params.has("utm_campaign")) {
                utm = params.get("utm_campaign");
            } else if (params.has("utm_term")) {
                utm = params.get("utm_term");
            } else if (typeof window.u_code !== "undefined" && window.u_code) {
                utm = window.u_code;
            }

            // Если метка найдена — добавляем параметр start
            if (utm) {
                var base = maxbotBtn.href.split('?')[0];
                maxbotBtn.href = base + "?start=" + encodeURIComponent(utm);
            } else {
                // Для теста подставляем тестовую метку (в продакшене убрать или заменить)
                maxbotBtn.href += "?start=I2TEST999";
            }

            console.log("MAXBOT final link:", maxbotBtn.href);
        }

        // Сразу пробуем обновить (если CRM ещё не отработала, window.u_code может быть пустым)
        getUtmAndUpdateLink();

        // Если CRM скрипт выставляет u_code асинхронно, дадим ему немного времени
        window.addEventListener('load', function() {
            // Повторно проверим, вдруг u_code появился позже
            if (typeof window.u_code !== "undefined" && window.u_code) {
                // Уже подставлено, если utm был из URL, иначе обновим
                var currentStart = new URL(maxbotBtn.href).searchParams.get('start');
                if (!currentStart || currentStart === "I2TEST999") {
                    // Перезаписываем, чтобы точно взять u_code
                    var base = maxbotBtn.href.split('?')[0];
                    maxbotBtn.href = base + "?start=" + encodeURIComponent(window.u_code);
                    console.log("MAXBOT updated with u_code:", maxbotBtn.href);
                }
            }
        });
    })();
</script>
